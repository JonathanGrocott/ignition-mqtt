<!DOCTYPE html>
<html>
<head>
    <title>Test AMD Module Structure</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
        // Simple AMD loader to test the module
        window.define = function(name, deps, factory) {
            console.log('AMD Module Name:', name);
            console.log('AMD Dependencies:', deps);
            
            // Resolve dependencies
            var resolvedDeps = deps.map(function(dep) {
                if (dep === 'React') return window.React;
                if (dep === 'ReactDOM') return window.ReactDOM;
                return null;
            });
            
            // Call factory and get exports
            var moduleExports = factory.apply(null, resolvedDeps);
            
            console.log('Module Exports:', moduleExports);
            console.log('Module Exports Keys:', Object.keys(moduleExports || {}));
            
            if (moduleExports && moduleExports.Configuration) {
                console.log('✅ SUCCESS: Found Configuration property');
                console.log('Configuration type:', typeof moduleExports.Configuration);
                console.log('Is Configuration a function?', typeof moduleExports.Configuration === 'function');
            } else {
                console.log('❌ FAILED: Configuration property not found');
                console.log('Available properties:', Object.keys(moduleExports || {}));
            }
            
            // Store for testing
            window.testModule = moduleExports;
        };
        
        // Mark as AMD environment
        define.amd = true;
    </script>
    <script src="mqtt-gateway/src/main/resources/mounted/mqtt-config.js"></script>
</head>
<body>
    <h1>AMD Module Test</h1>
    <p>Check the browser console for results</p>
    <div id="test-mount"></div>
    
    <script>
        // Try to render the component
        if (window.testModule && window.testModule.Configuration) {
            console.log('Attempting to render Configuration component...');
            try {
                var element = React.createElement(window.testModule.Configuration);
                ReactDOM.render(element, document.getElementById('test-mount'));
                console.log('✅ Component rendered successfully!');
            } catch (e) {
                console.log('❌ Error rendering component:', e);
            }
        }
    </script>
</body>
</html>
