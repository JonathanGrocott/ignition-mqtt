name: Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build modules
      run: ./gradlew clean :mqtt-uns-module:build :mqtt-sparkplug-module:build
    
    - name: Upload UNS module artifact
      uses: actions/upload-artifact@v4
      with:
        name: mqtt-uns-publisher-module
        path: mqtt-uns-module/build/*.modl
        retention-days: 30

    - name: Upload SparkplugB module artifact
      uses: actions/upload-artifact@v4
      with:
        name: mqtt-sparkplugb-publisher-module
        path: mqtt-sparkplug-module/build/*.modl
        retention-days: 30
