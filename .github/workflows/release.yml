name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build modules
      run: ./gradlew clean :mqtt-uns-module:build :mqtt-sparkplug-module:build

    - name: Sign modules
      run: ./scripts/sign-modules.sh both
    
    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep "version = " build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Module version: $VERSION"

    - name: Verify tag matches module version
      if: github.ref_type == 'tag'
      run: |
        EXPECTED_TAG="v$VERSION"
        if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
          echo "Tag $GITHUB_REF_NAME does not match module version $VERSION; expected $EXPECTED_TAG" >&2
          exit 1
        fi
    
    - name: Find .modl files
      id: find_modl
      run: |
        UNS_MODL_FILE=$(find mqtt-uns-module/build -name "*.modl" ! -name "*.unsigned.modl" -type f | head -1)
        SPARKPLUG_MODL_FILE=$(find mqtt-sparkplug-module/build -name "*.modl" ! -name "*.unsigned.modl" -type f | head -1)
        test -n "$UNS_MODL_FILE"
        test -n "$SPARKPLUG_MODL_FILE"
        echo "UNS_MODL_FILE=$UNS_MODL_FILE" >> $GITHUB_ENV
        echo "SPARKPLUG_MODL_FILE=$SPARKPLUG_MODL_FILE" >> $GITHUB_ENV
        echo "Found UNS module file: $UNS_MODL_FILE"
        echo "Found SparkplugB module file: $SPARKPLUG_MODL_FILE"

    - name: Verify signed modules
      run: |
        for module in "$UNS_MODL_FILE" "$SPARKPLUG_MODL_FILE"; do
          echo "Verifying signed module: $module"
          unzip -l "$module" | grep -q "certificates.p7b"
          unzip -l "$module" | grep -q "signatures.properties"
          if [[ "$module" == *.unsigned.modl ]]; then
            echo "Refusing to release unsigned module: $module" >&2
            exit 1
          fi
        done
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'SNAPSHOT') }}
        body: |
          ## MQTT UNS Publisher Module
          Version: ${{ env.VERSION }}

          ## MQTT SparkplugB Publisher Module
          Version: ${{ env.VERSION }}
          
          ### Installation
          1. Download the signed .modl file below
          2. Install it in Ignition via Config > Modules > Install or Upgrade a Module
          3. Accept the self-signed certificate if prompted
          
          ### Changes
          See the commit history for details on changes in this release.
        files: |
          ${{ env.UNS_MODL_FILE }}
          ${{ env.SPARKPLUG_MODL_FILE }}
