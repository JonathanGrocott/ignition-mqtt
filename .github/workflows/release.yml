name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build module
      run: ./gradlew clean build
    
    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep "version = " build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Module version: $VERSION"
    
    - name: Find .modl file
      id: find_modl
      run: |
        MODL_FILE=$(find build -name "*.modl" -type f | head -1)
        echo "MODL_FILE=$MODL_FILE" >> $GITHUB_ENV
        echo "Found module file: $MODL_FILE"
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'SNAPSHOT') }}
        body: |
          ## MQTT UNS Publisher Module
          Version: ${{ env.VERSION }}
          
          ### Installation
          1. Download the .modl file below
          2. Install it in Ignition via Config > Modules > Install or Upgrade a Module
          
          ### Changes
          See the commit history for details on changes in this release.
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.MODL_FILE }}
        asset_name: MQTT-UNS-Publisher-${{ env.VERSION }}.modl
        asset_content_type: application/octet-stream
